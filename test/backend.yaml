apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-backend
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-backend
  template:
    metadata:
      labels:
        app: demo-backend
    spec:
      containers:
        - name: agnhost
          image: registry.k8s.io/e2e-test-images/agnhost:2.39
          args: ["serve-hostname"]
          ports:
            - containerPort: 9376
---
apiVersion: v1
kind: Service
metadata:
  name: demo-backend
  namespace: demo
spec:
  selector:
    app: demo-backend
  ports:
    - port: 80
      targetPort: 9376
