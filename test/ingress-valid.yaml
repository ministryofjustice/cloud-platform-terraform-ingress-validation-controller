apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-valid
  namespace: demo
spec:
  ingressClassName: nginx
  rules:
    - host: demo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-backend
                port:
                  number: 80
